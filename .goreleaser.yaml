version: 2

builds:
  - main: ./src/cmd/previewctl
    binary: previewctl
    ldflags:
      - -X github.com/jake-landersweb/previewctl/src/version.Version={{.Version}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz

checksum:
  name_template: checksums.txt

release:
  prerelease: auto
